   <div class="navigation" >

        <div class="socials">
            <h1>Contact Me</h1>
              
        </div>
  
  <div class="contact-wrapper">
  <form
    id="contact-form"
    class="gform"
    method="POST"
    action="https://script.google.com/macros/s/AKfycbycp4iBUxawnztudsvPDD8BS-4hUgmZZhIjLTOA90g8ys-Cm-qUoBedCEkU1ZuENeuL/exec"
  >

    <div class="form-group">
      <div class="col-sm-12">
        <input
          type="text"
          class="form-control"
          id="name"
          name="Name"
          placeholder="NAME"
          required
        >
      </div>
    </div>

    <div class="form-group">
      <div class="col-sm-12">
        <input
          type="email"
          class="form-control"
          id="email"
          name="Email"
          placeholder="EMAIL"
          required
        >
      </div>
    </div>

    <textarea
      class="form-control"
      rows="10"
      name="Message"
      placeholder="MESSAGE"
      required
    ></textarea>

    <button
      class="btn btn-primary send-button"
      id="submit"
      type="submit"
    >
      <div class="alt-send-button">
        <i class="fa fa-paper-plane"></i>
        <span class="send-text">SEND</span>
      </div>
    </button>

    <div class="thankyou_message" style="display:none">
      <h2><em>Thanks</em> for messaging me!</h2>
      <h2> I will get back to you soon!</h2>
    </div>

  </form>
</div>
